# Site settings
title: mrrootsec:~# # site title
description: >- # site description
  Blah Blah,meet him <a href="https://github.com/mrrootsec" target="_blank" rel="noopener">@github</a>.
lang: en-US # default lang
timezone: Asia/Kolkata # set your timezone
image: assets/img/Mrroot.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/mrrootsec # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Mrrootsec # author name
  bio: >- # tell to the world
    Application Security 
  username: mrroot # general username
  github: mrrootsec # github username
  twitter: _mohd_saqlain # twitter username
  facebook:  # facebook username
  email: mrrootbounty@gmail.com # email adress
  avatar: /assets/img/Mrroot.png # change with your own avatar

# URL settings
url: "https://mrrootsec.github.io" #
baseurl: 
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
  